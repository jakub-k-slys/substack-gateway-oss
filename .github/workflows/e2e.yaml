name: E2E Tests

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy Vercel Production
    types:
      - completed

jobs:
  e2e:
    name: E2E
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run E2E tests (behave)
        run: uv run behave e2e/ --junit --junit-directory e2e-reports/
        env:
          SUBSTACK_GATEWAY_BASE_URL: ${{ secrets.SUBSTACK_GATEWAY_BASE_URL }}
          SUBSTACK_GATEWAY_TOKEN: ${{ secrets.SUBSTACK_GATEWAY_TOKEN }}
          SUBSTACK_TOKEN: ${{ secrets.SUBSTACK_TOKEN }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
          E2E_PROFILE_SLUG: ${{ secrets.E2E_PROFILE_SLUG }}
          E2E_NOTE_ID: ${{ secrets.E2E_NOTE_ID }}
          E2E_POST_ID: ${{ secrets.E2E_POST_ID }}

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: e2e-reports/
          if-no-files-found: ignore

      - name: Write test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, os
          from xml.etree import ElementTree as ET

          lines = ["## E2E Test Results\n"]
          total = {"tests": 0, "failed": 0, "skipped": 0}

          for path in sorted(glob.glob("e2e-reports/*.xml")):
              suite = ET.parse(path).getroot()
              if suite.tag != "testsuite":
                  suite = suite.find("testsuite")
              tests = int(suite.get("tests", 0))
              failed = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped", 0))
              name = suite.get("name", os.path.basename(path))
              icon = "✅" if failed == 0 else "❌"
              lines.append(f"### {icon} {name}\n")
              lines.append("| Scenario | Status |")
              lines.append("|----------|--------|")
              for tc in suite.findall("testcase"):
                  scenario = tc.get("name", "Unknown scenario")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      status = "❌ Failed"
                  elif tc.find("skipped") is not None:
                      status = "⏭️ Skipped"
                  else:
                      status = "✅ Passed"
                  lines.append(f"| {scenario} | {status} |")
              lines.append("")
              total["tests"] += tests
              total["failed"] += failed
              total["skipped"] += skipped

          passed = total["tests"] - total["failed"] - total["skipped"]
          overall = "✅" if total["failed"] == 0 else "❌"
          lines.append("---\n")
          lines.append(
              f"**{overall} Total: {passed}/{total['tests']} passed, {total['failed']} failed, {total['skipped']} skipped**\n"
          )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF

      - name: Send Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import glob, json, os, urllib.request
          from xml.etree import ElementTree as ET

          total = {"tests": 0, "failed": 0, "skipped": 0}
          sections = []

          for path in sorted(glob.glob("e2e-reports/*.xml")):
              suite = ET.parse(path).getroot()
              if suite.tag != "testsuite":
                  suite = suite.find("testsuite")
              tests = int(suite.get("tests", 0))
              failed = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped", 0))
              name = suite.get("name", os.path.basename(path))
              icon = "✅" if failed == 0 else "❌"
              scenario_lines = [f"{icon} <b>{name}</b>"]
              for tc in suite.findall("testcase"):
                  scenario = tc.get("name", "Unknown scenario")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      scenario_icon = "❌"
                  elif tc.find("skipped") is not None:
                      scenario_icon = "⏭"
                  else:
                      scenario_icon = "✅"
                  scenario_lines.append(f"  {scenario_icon} {scenario}")
              sections.append("\n".join(scenario_lines))
              total["tests"] += tests
              total["failed"] += failed
              total["skipped"] += skipped

          passed = total["tests"] - total["failed"] - total["skipped"]
          overall = "✅ All passed" if total["failed"] == 0 else f"❌ {total['failed']} failed"
          run_url = os.environ["RUN_URL"]

          lines = [
              f"<b>substack-gateway-oss E2E Results - {overall}</b>",
              f"Total: {passed}/{total['tests']} passed, {total['skipped']} skipped",
              "",
              *sections,
              "",
              f'<a href="{run_url}">View run</a>',
          ]
          text = "\n".join(lines)

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set - skipping")
          else:
              payload = json.dumps(
                  {
                      "chat_id": chat_id,
                      "text": text,
                      "parse_mode": "HTML",
                      "disable_web_page_preview": True,
                  }
              ).encode()
              request = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(request) as response:
                  print("Telegram response:", response.status)
          EOF
