name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Build
        run: uv build --package gateway && uv build --package gateway-pro

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format)
        run: uv run ruff format --check .

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Type-check (ty)
        run: uv run ty check .

  pytest:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests (pytest)
        run: uv run pytest tests/ --junit-xml=pytest-reports/results.xml

      - name: Write test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, os
          from xml.etree import ElementTree as ET

          lines = ["## pytest Results\n",
                   "| Suite | Tests | Passed | Failed | Skipped |",
                   "|-------|------:|-------:|-------:|--------:|"]
          total = {"tests": 0, "failed": 0, "skipped": 0}

          for path in sorted(glob.glob("pytest-reports/*.xml")):
              root = ET.parse(path).getroot()
              suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
              for suite in suites:
                  tests   = int(suite.get("tests",    0))
                  failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
                  skipped = int(suite.get("skipped",  0))
                  passed  = tests - failed - skipped
                  name    = suite.get("name", os.path.basename(path))
                  icon    = "✅" if failed == 0 else "❌"
                  lines.append(f"| {icon} {name} | {tests} | {passed} | {failed} | {skipped} |")
                  total["tests"]   += tests
                  total["failed"]  += failed
                  total["skipped"] += skipped

          tp = total["tests"] - total["failed"] - total["skipped"]
          lines.append(f"| **Total** | **{total['tests']}** | **{tp}** | **{total['failed']}** | **{total['skipped']}** |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF

  behave:
    name: behave
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests (behave)
        run: uv run behave --junit --junit-directory behave-reports/

      - name: Write test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, os
          from xml.etree import ElementTree as ET

          lines = ["## behave Results\n",
                   "| Feature | Tests | Passed | Failed | Skipped |",
                   "|---------|------:|-------:|-------:|--------:|"]
          total = {"tests": 0, "failed": 0, "skipped": 0}

          for path in sorted(glob.glob("behave-reports/*.xml")):
              suite = ET.parse(path).getroot()
              if suite.tag != "testsuite":
                  suite = suite.find("testsuite")
              tests   = int(suite.get("tests",    0))
              failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped",  0))
              passed  = tests - failed - skipped
              name    = suite.get("name", os.path.basename(path))
              icon    = "✅" if failed == 0 else "❌"
              lines.append(f"| {icon} {name} | {tests} | {passed} | {failed} | {skipped} |")
              total["tests"]   += tests
              total["failed"]  += failed
              total["skipped"] += skipped

          tp = total["tests"] - total["failed"] - total["skipped"]
          lines.append(f"| **Total** | **{total['tests']}** | **{tp}** | **{total['failed']}** | **{total['skipped']}** |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF
