name: Make a new release
on:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    strategy:
      fail-fast: false
    steps:
      - name: Mint a GitHub App installation token
        # Required so the release "published" event fans out into downstream
        # workflows (Deploy Vercel Production, Build and publish Docker image) —
        # GITHUB_TOKEN-triggered events do not.
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v10
        id: semantic
        with:
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Build package
        if: steps.semantic.outputs.released == 'true'
        run: uv build

      - name: Upload artifacts to GitHub Release
        if: steps.semantic.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.semantic.outputs.tag }}
