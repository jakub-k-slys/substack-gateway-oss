name: E2E Tests

on:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run E2E tests (behave)
        run: uv run behave e2e/ --junit --junit-directory e2e-reports/
        env:
          SUBSTACK_GATEWAY_BASE_URL: ${{ secrets.SUBSTACK_GATEWAY_BASE_URL }}
          SUBSTACK_TOKEN: ${{ secrets.SUBSTACK_TOKEN }}
          PUBLICATION_URL: ${{ secrets.PUBLICATION_URL }}
          E2E_PROFILE_SLUG: ${{ secrets.E2E_PROFILE_SLUG }}
          E2E_NOTE_ID: ${{ secrets.E2E_NOTE_ID }}
          E2E_POST_ID: ${{ secrets.E2E_POST_ID }}

      - name: Write test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, os
          from xml.etree import ElementTree as ET

          lines = ["## E2E Test Results\n",
                   "| Feature | Tests | Passed | Failed | Skipped |",
                   "|---------|------:|-------:|-------:|--------:|"]
          total = {"tests": 0, "failed": 0, "skipped": 0}

          for path in sorted(glob.glob("e2e-reports/*.xml")):
              suite = ET.parse(path).getroot()
              if suite.tag != "testsuite":
                  suite = suite.find("testsuite")
              tests   = int(suite.get("tests",    0))
              failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped",  0))
              passed  = tests - failed - skipped
              name    = suite.get("name", os.path.basename(path))
              icon    = "✅" if failed == 0 else "❌"
              lines.append(f"| {icon} {name} | {tests} | {passed} | {failed} | {skipped} |")
              total["tests"]   += tests
              total["failed"]  += failed
              total["skipped"] += skipped

          tp = total["tests"] - total["failed"] - total["skipped"]
          lines.append(f"| **Total** | **{total['tests']}** | **{tp}** | **{total['failed']}** | **{total['skipped']}** |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF
