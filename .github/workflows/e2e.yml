name: E2E Tests

on:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment
        if: github.event_name == 'push'
        run: sleep 60

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run E2E tests (behave)
        run: uv run behave e2e/ --junit --junit-directory e2e-reports/
        env:
          SUBSTACK_GATEWAY_BASE_URL: ${{ secrets.SUBSTACK_GATEWAY_BASE_URL }}
          SUBSTACK_TOKEN: ${{ secrets.SUBSTACK_TOKEN }}
          SUBSTACK_PUBLICATION_URL: ${{ secrets.SUBSTACK_PUBLICATION_URL }}
          SUBSTACK_GATEWAY_ADMIN_TOKEN: ${{ secrets.SUBSTACK_GATEWAY_ADMIN_TOKEN }}
          E2E_PROFILE_SLUG: ${{ secrets.E2E_PROFILE_SLUG }}
          E2E_NOTE_ID: ${{ secrets.E2E_NOTE_ID }}
          E2E_POST_ID: ${{ secrets.E2E_POST_ID }}

      - name: Write test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, os
          from xml.etree import ElementTree as ET

          lines = ["## E2E Test Results\n",
                   "| Feature | Tests | Passed | Failed | Skipped |",
                   "|---------|------:|-------:|-------:|--------:|"]
          total = {"tests": 0, "failed": 0, "skipped": 0}

          for path in sorted(glob.glob("e2e-reports/*.xml")):
              suite = ET.parse(path).getroot()
              if suite.tag != "testsuite":
                  suite = suite.find("testsuite")
              tests   = int(suite.get("tests",    0))
              failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped",  0))
              passed  = tests - failed - skipped
              name    = suite.get("name", os.path.basename(path))
              icon    = "✅" if failed == 0 else "❌"
              lines.append(f"| {icon} {name} | {tests} | {passed} | {failed} | {skipped} |")
              total["tests"]   += tests
              total["failed"]  += failed
              total["skipped"] += skipped

          tp = total["tests"] - total["failed"] - total["skipped"]
          lines.append(f"| **Total** | **{total['tests']}** | **{tp}** | **{total['failed']}** | **{total['skipped']}** |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF

      - name: Send Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import glob, os, urllib.request, urllib.parse, json
          from xml.etree import ElementTree as ET

          total = {"tests": 0, "failed": 0, "skipped": 0}
          rows = []

          for path in sorted(glob.glob("e2e-reports/*.xml")):
              suite = ET.parse(path).getroot()
              if suite.tag != "testsuite":
                  suite = suite.find("testsuite")
              tests   = int(suite.get("tests",    0))
              failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped",  0))
              passed  = tests - failed - skipped
              name    = suite.get("name", os.path.basename(path))
              icon    = "✅" if failed == 0 else "❌"
              rows.append(f"{icon} <b>{name}</b>: {passed}/{tests} passed")
              total["tests"]   += tests
              total["failed"]  += failed
              total["skipped"] += skipped

          tp = total["tests"] - total["failed"] - total["skipped"]
          overall = "✅ All passed" if total["failed"] == 0 else f"❌ {total['failed']} failed"
          run_url = os.environ["RUN_URL"]

          lines = [
              f"<b>E2E Results — {overall}</b>",
              f"Total: {tp}/{total['tests']} passed, {total['skipped']} skipped",
              "",
              *rows,
              "",
              f'<a href="{run_url}">View run</a>',
          ]
          text = "\n".join(lines)

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping")
          else:
              payload = json.dumps({
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True,
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(req) as resp:
                  print("Telegram response:", resp.status)
          EOF
