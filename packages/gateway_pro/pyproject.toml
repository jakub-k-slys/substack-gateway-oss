[project]
name = "gateway_pro"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "gateway_oss",
  "aiocache>=0.12.3",
  "pyjwt>=2.11.0",
  "bcrypt>=5.0.0",
  "sqlalchemy>=2.0.48",
  "asyncpg>=0.31.0",
  "htpy>=25.12.0",
  "aiofiles>=24.1.0",
]

[tool.uv.sources]
gateway_oss = { workspace = true }

[project.scripts]
gateway_pro = "gateway_pro.main:main"

[project.entry-points."substack_gateway_oss.extensions"]
gateway_pro = "gateway_pro.extension:get_extension"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gateway_pro"]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
branch = "main"
commit_author = "Jakub Slys <jakub@slys.dev>"
commit_message = "chore(release): {version}"
tag_format = "{version}"
