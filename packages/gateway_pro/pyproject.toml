[project]
name = "gateway-pro"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "gateway",
  "pyjwt>=2.11.0",
  "bcrypt>=5.0.0",
  "sqlalchemy>=2.0.48",
  "asyncpg>=0.31.0",
  "htpy>=25.12.0",
  "aiofiles>=24.1.0",
]

[tool.uv.sources]
gateway = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gateway_pro"]
