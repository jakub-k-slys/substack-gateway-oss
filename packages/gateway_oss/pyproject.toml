[project]
name = "gateway_oss"
version = "2.1.0"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.137.1",
  "httpx>=0.28.0",
  "pyrate-limiter>=4.4.0",
  "pydantic>=2.13.4",
  "pydantic-settings>=2.14.1",
  "aiocache[redis]>=0.12.3",
  "fastmcp>=3.4.2",
  "markdownify>=1.2.2",
  "tenacity>=9.1.2",
  "uvloop>=0.22.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gateway_oss"]
