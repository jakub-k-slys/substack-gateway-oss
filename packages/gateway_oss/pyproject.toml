[project]
name = "gateway_oss"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.135.1",
  "httpx>=0.28.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "async-lru>=2.0",
  "fastmcp>=3.0.2",
  "markdownify>=1.2.2",
]

[project.scripts]
gateway_oss = "gateway_oss.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gateway_oss"]
