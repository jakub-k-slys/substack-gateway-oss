[project]
name = "substack-gateway"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.121.0",
  "uvicorn>=0.34.0",
  "httpx>=0.28.0",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["api", "client", "models"]

[dependency-groups]
dev = [
  "ruff>=0.8.0",
  "ty>=0.0.1",
  "behave>=1.2.6",
  "respx>=0.22.0",
  "httpx>=0.28.0",
]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.behave]
paths = ["features/"]
show_timings = true
summary = true
default_format = "pretty"

[tool.ty.src]
exclude = ["features/"]
