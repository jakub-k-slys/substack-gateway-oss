[project]
name = "substack-gateway"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "gateway",
  "gateway-pro",
  "uvicorn>=0.41.0",
  "uvloop>=0.22.1",
]

[project.scripts]
app = "gateway.main:app"

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
gateway = { workspace = true }
gateway-pro = { workspace = true }

[dependency-groups]
dev = [
  "ruff>=0.15.4",
  "ty>=0.0.19",
  "behave>=1.2.6",
  "respx>=0.22.0",
  "httpx>=0.28.0",
  "pytest>=8.0",
]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.behave]
paths = ["features/"]
show_timings = true
summary = true
default_format = "pretty"

[tool.ty.src]
exclude = ["features/", "e2e/"]
